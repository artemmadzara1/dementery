name: Flask CI/CD | ЦТК.Space

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: pytest || echo "Тесты не найдены, но продолжаем..."

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - run: |
          cat << "EOF"
          ░█████╗░████████╗██╗░░██╗
          ██╔══██╗╚══██╔══╝██║░██╔╝
          ██║░░╚═╝░░░██║░░░█████═╝░
          ██║░░██╗░░░██║░░░██╔═██╗░
          ╚█████╔╝░░░██║░░░██║░╚██╗
          ░╚════╝░░░░╚═╝░░░╚═╝░░╚═╝
          ░██████╗██████╗░░█████╗░░█████╗░███████╗
          ██╔════╝██╔══██╗██╔══██╗██╔══██╗██╔════╝
          ╚█████╗░██████╔╝███████║██║░░╚═╝█████╗░░
          ░╚═══██╗██╔═══╝░██╔══██║██║░░██╗██╔══╝░░
          ██████╔╝██║░░░░░██║░░██║╚█████╔╝███████╗
          ╚═════╝░╚═╝░░░░░╚═╝░░╚═╝░╚════╝░╚══════╝
          EOF
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 600s
          command_timeout: 10m
          script: |
            cd /home/dement/dementery || exit
            git fetch --all
            git reset --hard origin/main
            ./venv/bin/pip install -r requirements.txt
            
            SERVICE_FILE="/etc/systemd/system/flask_app.service"
            cat << EOF | sudo tee $SERVICE_FILE
            [Unit]
            Description=Gunicorn instance to serve dementery Flask App
            After=network.target

            [Service]
            User=dement
            Group=dement
            WorkingDirectory=/home/dement/dementery
            Environment="PATH=/home/dement/dementery/venv/bin"
            ExecStart=/home/dement/dementery/venv/bin/gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:80 app:app
            Restart=always
            RestartSec=5
            StandardOutput=append:/home/dement/dementery/app-dementery.log
            StandardError=append:/home/dement/dementery/app-dementery.log

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable flask_app
            sudo systemctl restart flask_app